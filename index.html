<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spatial Geometry Art</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
    }

    #phase1, #phase2, #phase3 {
      position: absolute;
      inset: 0;
    }

    /* === Phase 1: スタースクリーン === */
    #phase1 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: #ffffff;
    }
    #logo-img {
      max-width: 400px;
      height: auto;
      margin-bottom: 3rem;
    }
    .btn {
      padding: 1rem 3rem;
      font-size: 1.5rem;
      font-family: inherit;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #333333;
      transform: scale(1.05);
    }
    .btn:disabled {
      background: #cccccc;
      color: #666666;
      cursor: not-allowed;
      transform: none;
    }

    /* === Phase 2: 録画・データ収集 === */
    #phase2 {
      display: none;
      z-index: 50;
      background: #000;
    }
    #video-feed {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #mp-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      z-index: 2;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
    }
    #hud-top {
      display: flex;
      justify-content: center;
    }
    #rec-indicator {
      background: rgba(0,0,0,0.6);
      padding: 1rem 2rem;
      border-radius: 30px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid rgba(255,255,255,0.3);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #rec-indicator.active {
      opacity: 1;
    }
    .rec-dot {
      width: 15px;
      height: 15px;
      background: red;
      border-radius: 50%;
    }
    #rec-indicator.active .rec-dot {
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #countdown-center {
      font-size: 10rem;
      font-weight: bold;
      text-align: center;
      margin-top: 15vh;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
      color: #fff;
    }
    #hud-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    #vol-meter-bg {
      width: 200px;
      height: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 5px;
      border: 1px solid rgba(255,255,255,0.5);
    }
    #vol-meter {
      width: 0%;
      height: 100%;
      background: #00ffff;
      transition: width 0.1s;
    }
    #ono-display {
      font-size: 4rem;
      color: #000000;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 15px rgba(255,255,255,0.6);
      text-align: right;
    }

    /* === Phase 3: 生成結果 === */
    #phase3 {
      display: none;
      z-index: 80;
      background: #222;
    }
    #three-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #playback-video {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 240px;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      border: 3px solid rgba(255,255,255,0.8);
      transform: scaleX(-1);
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    #p3-ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
    }
    #p3-header {
      text-align: center;
      font-size: 1.5rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.5);
      padding: 0.5rem 2rem;
      border-radius: 20px;
      align-self: center;
    }
    #p3-controls {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      pointer-events: auto;
      margin-bottom: 20px;
    }
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      z-index: 200;
      display: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <!-- Phase 1: スタースクリーン -->
  <div id="phase1">
    <img id="logo-img" src="logo.png" alt="MokoMoko">
    <button id="btn-start" class="btn">START EXPERIENCE</button>
  </div>

  <!-- Phase 2: 録画・データ収集 -->
  <div id="phase2">
    <video id="video-feed" autoplay playsinline muted></video>
    <canvas id="mp-canvas"></canvas>
    
    <div id="hud">
      <div id="hud-top">
        <div id="rec-indicator"><div class="rec-dot"></div> RECORDING</div>
      </div>
      <div id="countdown-center"></div>
      <div id="hud-bottom">
        <div>
          <div style="font-size: 1.2rem; text-shadow: 0 2px 4px #000;">MIC VOLUME</div>
          <div id="vol-meter-bg"><div id="vol-meter"></div></div>
        </div>
        <div id="ono-display"></div>
      </div>
    </div>
  </div>

  <!-- Phase 3: 生成結果 -->
  <div id="phase3">
    <canvas id="three-canvas"></canvas>
    <video id="playback-video" playsinline muted loop></video>
    <div id="p3-ui">
      <div id="p3-header">READY (Drag to rotate 360°)</div>
      <div style="flex-grow:1;"></div>
      <div id="p3-controls">
        <button id="btn-download-3d" class="btn" style="font-size:1.2rem; padding:0.8rem 2rem;">DOWNLOAD 3D ART</button>
        <button id="btn-download-video" class="btn" style="font-size:1.2rem; padding:0.8rem 2rem;">DOWNLOAD VIDEO</button>
        <button id="btn-retry" class="btn" style="font-size:1.2rem; padding:0.8rem 2rem;">RESTART</button>
      </div>
    </div>
  </div>

  <div id="loading">GENERATING SPACE...</div>

  <script type="module">
    // エラーハンドリング・画面オーバーレイ表示（デバッグ用）
    window.onerror = function(message, source, lineno, colno, error) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100vw';
      div.style.height = '100vh';
      div.style.backgroundColor = 'rgba(255, 0, 0, 0.95)';
      div.style.color = 'white';
      div.style.zIndex = '999999';
      div.style.padding = '30px';
      div.style.fontFamily = 'monospace';
      div.style.fontSize = '14px';
      div.style.whiteSpace = 'pre-wrap';
      div.style.overflow = 'auto';
      div.innerHTML = `<h2>[MokoMoko] Run-time JS Error Detected</h2>
<p style="font-size:16px;color:#ffcccc;"><b>Message:</b> \${message}</p>
<p><b>Source:</b> \${source}</p>
<p><b>Line:</b> \${lineno} : <b>Col:</b> \${colno}</p>
<p><b>Stack Trace:</b><br>\${error ? error.stack : 'N/A'}</p>`;
      document.body.appendChild(div);
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100vw';
      div.style.height = '100vh';
      div.style.backgroundColor = 'rgba(255, 0, 0, 0.95)';
      div.style.color = 'white';
      div.style.zIndex = '999999';
      div.style.padding = '30px';
      div.style.fontFamily = 'monospace';
      div.style.fontSize = '14px';
      div.style.whiteSpace = 'pre-wrap';
      div.style.overflow = 'auto';
      div.innerHTML = `<h2>[MokoMoko] Unhandled Promise Rejection</h2>
<p style="font-size:16px;color:#ffcccc;"><b>Reason:</b> \${event.reason}</p>
<p><b>Stack Trace:</b><br>\${event.reason && event.reason.stack ? event.reason.stack : 'N/A'}</p>`;
      document.body.appendChild(div);
    });
    import { FilesetResolver, PoseLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm';

    // --- グローバル状態 ---
    let currentPhase = 1;
    let recordData = []; // 毎フレームのデータを蓄積
    let isRecording = false;
    let currentOno = '';
    
    function convertSpeechTextToOno(text) {
      if(!text) return "";
      let clean = text.trim();
      
      const KANJI_TO_ONO = [
        { pattern: /吉良|綺羅|雲霧|雲切り|きら|星|キラ/g, repl: "キラキラ" },
        { pattern: /棘|刺|突起|とげ|とげとげ|トゲ/g, repl: "トゲトゲ" },
        { pattern: /回転|螺旋|渦|ぐる|くる|車|クル|ぐる/g, repl: "クルクル" },
        { pattern: /浮遊|綿毛|柔らか|ふわ|ほわ|フワ/g, repl: "フワフワ" },
        { pattern: /国々|弾力|もち|ぷに|ぷる|ぷよ|モチ|ぷにゅ/g, repl: "ぷにぷに" },
        { pattern: /液|水滴|濡|泥|ざぶ|ぽた|どろ|ドロ|ぬめ/g, repl: "ドロドロ" },
        { pattern: /砂利|岩石|粗|ざら|ごつ|ゴツ|ザラ/g, repl: "ザラザラ" },
        { pattern: /動悸|心拍|鼓動|興奮|どき|わく|ドキ|ワク/g, repl: "ドキドキ" },
        { pattern: /衝撃|衝突|丼|鈍|だん|どん|ドン|バーン|ばーん/g, repl: "ドンドン" },
        { pattern: /如き|樹木|植物|枝|にょき|ニョキ|もく|モク|成長/g, repl: "ニョキニョキ" },
        { pattern: /彦彦|比古|機械|電子|ぴこ|かち|ピコ|カチ/g, repl: "ピコピコ" },
        { pattern: /霧|煙|もや|ゆら|モヤ|ユラ/g, repl: "モヤモヤ" }
      ];

      for(let item of KANJI_TO_ONO) {
        if(item.pattern.test(clean)) {
          return item.repl;
        }
      }

      let temp = clean.replace(/[^ぁ-んァ-ヶー一-龠]/g, "");
      let noKanji = temp.replace(/[一-龠]/g, "");
      if(noKanji.length >= 2) {
        return noKanji;
      }
      return temp.replace(/[一-龠]/g, "") || clean;
    }
    
    // API関連
    let audioContext, analyser, dataArray;
    let poseLandmarker;
    let speechRecognition;
    let mediaRecorder;
    let recordedChunks = [];
    
    // 骨格データ一時保存
    let prevLW = null;
    let prevRW = null;

    // DOM
    const phase1 = document.getElementById('phase1');
    const phase2 = document.getElementById('phase2');
    const phase3 = document.getElementById('phase3');
    const videoFeed = document.getElementById('video-feed');
    const mpCanvas = document.getElementById('mp-canvas');
    const mpCtx = mpCanvas.getContext('2d');
    const countdownCenter = document.getElementById('countdown-center');
    const recIndicator = document.getElementById('rec-indicator');
    const volMeter = document.getElementById('vol-meter');
    const onoDisplay = document.getElementById('ono-display');
    const playbackVideo = document.getElementById('playback-video');
    const loadingScreen = document.getElementById('loading');

    // --- APIの初期化 ---
    async function initAPIs() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        videoFeed.srcObject = stream;
        
        // Web Audio
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        // MediaRecorder (実写映像保存用)
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };

        // MediaPipe Pose
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numPoses: 1
        });

        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SpeechRecognition) {
          speechRecognition = new SpeechRecognition();
          speechRecognition.lang = 'ja-JP';
          speechRecognition.continuous = true;
          speechRecognition.interimResults = true;
          
          speechRecognition.onresult = (e) => {
            if(!isRecording) return;
            for(let i = e.resultIndex; i < e.results.length; i++) {
              const text = e.results[i][0].transcript;
              currentOno = convertSpeechTextToOno(text);
              onoDisplay.textContent = currentOno;
            }
          };

          speechRecognition.onend = () => {
            if(isRecording) {
              try {
                speechRecognition.start();
              } catch(err) {
                console.warn("SpeechRecognition auto-restart failed:", err);
              }
            }
          };

          speechRecognition.onerror = (err) => {
            console.error("SpeechRecognition error:", err);
            if(isRecording && err.error !== 'aborted') {
              setTimeout(() => {
                try { speechRecognition.start(); } catch(e){}
              }, 500);
            }
          };

          // ダミースタートさせて事前にブラウザのマイク音声認識許可を取得する
          try {
            speechRecognition.start();
            setTimeout(() => {
              try { speechRecognition.stop(); } catch(e){}
            }, 300);
          } catch(e) {
            console.warn("SpeechRecognition dummy start failed:", e);
          }
        }

        return true;
      } catch(e) {
        alert("カメラとマイクへのアクセスを許可してください");
        console.error(e);
        return false;
      }
    }

    function lmToWorld(lm) {
      // 空間を大きくダイナミックに使うためにスケールを大幅に拡大
      return new THREE.Vector3((lm.x - 0.5) * 120, -(lm.y - 0.5) * 80, lm.z * -150);
    }

    // --- メインループ (Phase 2) ---
    let lastVideoTime = -1;
    function collectionLoop() {
      if(currentPhase !== 2) return;
      requestAnimationFrame(collectionLoop);

      // 音量解析
      let rms = 0;
      if(analyser) {
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for(let i=0; i<dataArray.length; i++) {
          let n = (dataArray[i]/128.0)-1.0;
          sum += n*n;
        }
        rms = Math.sqrt(sum/dataArray.length);
        volMeter.style.width = `${Math.min(rms*500, 100)}%`;
      }

      // 骨格解析
      let lwPos = null, rwPos = null;
      let lwVel = 0, rwVel = 0;
      
      if(poseLandmarker && videoFeed.currentTime !== lastVideoTime) {
        lastVideoTime = videoFeed.currentTime;
        const results = poseLandmarker.detectForVideo(videoFeed, performance.now());
        
        mpCtx.clearRect(0, 0, mpCanvas.width, mpCanvas.height);
        
        if(results.landmarks && results.landmarks.length > 0) {
          const lm = results.landmarks[0];
          
          // ワイヤーフレーム描画 (簡易)
          mpCtx.strokeStyle = 'rgba(255,255,255,0.4)';
          mpCtx.lineWidth = 2;
          const drawLine = (i, j) => {
            mpCtx.beginPath();
            mpCtx.moveTo(lm[i].x * mpCanvas.width, lm[i].y * mpCanvas.height);
            mpCtx.lineTo(lm[j].x * mpCanvas.width, lm[j].y * mpCanvas.height);
            mpCtx.stroke();
          };
          drawLine(11,13); drawLine(13,15); // 左腕
          drawLine(12,14); drawLine(14,16); // 右腕
          drawLine(11,12); // 肩
          
          if(lm[15]) lwPos = lmToWorld(lm[15]);
          if(lm[16]) rwPos = lmToWorld(lm[16]);
          
          // 手のひらの開き具合 (親指と小指・人差し指の距離でグー/パーを判定)
          let lSpread = 0, rSpread = 0;
          if(lm[15] && lm[21] && lm[17]) lSpread = new THREE.Vector3(lm[21].x, lm[21].y, lm[21].z).distanceTo(new THREE.Vector3(lm[17].x, lm[17].y, lm[17].z));
          if(lm[16] && lm[22] && lm[18]) rSpread = new THREE.Vector3(lm[22].x, lm[22].y, lm[22].z).distanceTo(new THREE.Vector3(lm[18].x, lm[18].y, lm[18].z));

          if(lwPos && prevLW) lwVel = lwPos.distanceTo(prevLW);
          if(rwPos && prevRW) rwVel = rwPos.distanceTo(prevRW);
          
          if(lwPos) prevLW = lwPos.clone();
          if(rwPos) prevRW = rwPos.clone();
          
          // 一時的にグローバルに保存して記録時に使う
          window.lastLSpread = lSpread;
          window.lastRSpread = rSpread;
        }
      }

      // データ記録
      if(isRecording) {
        recordData.push({
          rms: rms,
          ono: currentOno,
          lw: lwPos ? lwPos.clone() : null,
          rw: rwPos ? rwPos.clone() : null,
          lwVel: lwVel,
          rwVel: rwVel,
          lSpread: window.lastLSpread || 0,
          rSpread: window.lastRSpread || 0
        });

    // === 特徴量抽出 ===
    function findOnoParams(text){
      if(!text)return null;
      let best=null,bestLen=0;
      for(let w of Object.keys(ONO_DB)){if(text.includes(w)&&w.length>bestLen){best=w;bestLen=w.length;}}
      if(best)return{word:best,p:ONO_DB[best]};
      for(let i=0;i<text.length-1;i++){let bi=text.slice(i,i+2);for(let w of Object.keys(ONO_DB)){if(w.includes(bi))return{word:w,p:ONO_DB[w]};}}
      for(let ch of text){for(let w of Object.keys(ONO_DB)){if(w[0]===ch)return{word:w,p:ONO_DB[w]};}}
      return null;
    }

    function categorize(text, p) {
      const has = (...words) => words.some(w => text.includes(w));
      
      // カテゴリ分類マッチングの拡張
      if(has('どん','ばーん','どかん','ぼん','ドーン','バーン','ドン','ボン','ぱあん','だん','ドンドン','どんどん','ドカン','どかん','バーン','ばーん','ドーン','どーん','ガシャン','がしゃん','衝撃','爆発')) return 'impact';
      if(has('とげ','しゅっ','ぴゅっ','ずばっ','さっ','ちく','さく','鋭','スパイク','シュッ','ピュッ','ぎざ','トゲトゲ','とげとげ','シュ','しゅ','シュッ','しゅっ','ピュッ','ぴゅっ','ビュッ','びゅっ','チクチク','ちくちく','ギザギザ','ぎざぎざ','バキバキ','ばきばき','鋭い')) return 'sharp';
      if(has('くる','ぐる','うず','まわ','ろーる','クル','グル','スピン','まわる','マワル','うずうず','ウズウズ','回転')) return 'spiral';
      if(has('りん','キラ','ピカ','ちか','チカ','きら','リン','光','輝','きらり','かがやく','カガヤク','めくるめく','きらめく','黄金')) return 'glowring';
      if(has('かち','ぱち','ぴこ','カタ','カチ','パチ','ピコ','デジタル','カク','ピクセル','グリッド')) return 'pixelgrid';
      if(has('すー','さら','もや','ユラ','サラ','モヤ','サー','宇宙','星','すう','にじむ','ニジム','じわー','ジワー','星屑','ネブラ')) return 'nebula';
      if(has('にょき','モく','モク','スク','伸び','ゾワ','ニョキ','植物','木','枝','のびのび')) return 'fractaltree';
      if(has('ふわ','ほわ','そよ','ゆら','ふんわり','フワ','スー','そよそよ','ソヨソヨ','すー','スー','綿毛','風')) return 'soft';
      if(has('もち','ぷに','ぐに','のび','ぷる','ぷよ','モチ','ぷにゅ','はじける','ハジケル','いきいき','ぷにゅ','ぷっくり','ぐnya','のびる','ぐにゃぐにゃ','グニャグニャ','弾性','ゴム','ジェリー')) return 'elastic';
      if(has('ざぶ','ぽた','ぬる','とろ','じわ','ぴちゃ','ドロ','ざざ','ぬめ','ザブザブ','ざぶざぶ','ポタポタ','ぽたぽた','とける','トける','ひたひた','ヒタヒタ','ぽちゃぽちゃ','ポチャポチャ','どぶどぶ','ドブドブ','とろり','ぬめり','液体','溶ける','にじむ')) return 'liquid';
      if(has('ざら','ごつ','ごろ','がさ','でこ','ジャリ','ゴツ','ザラ','ゴツゴツ','ごつごつ','ずーん','ズーン','ボコボコ','ぼこぼこ','さらり','岩','石','砂利','粗い')) return 'rough';
      if(has('どき','わく','ぞく','きゅん','はら','ドキ','ワク','きゅ','ドキドキ','どきどき','じわり','ジワリ','しみじみ','すーっ','スーッ','感情','心拍')) return 'emotion';

      if(!p) return 'soft';
      let [h,s,l,vtx,freq,amp,div,ior,rough,metal,emis] = p;
      if(metal>0.7 && rough<0.3) return 'sharp';
      if(emis>2.5) return 'impact';
      if(freq>8) return 'spiral';
      if(rough>0.7) return 'rough';
      if(ior<1.2) return 'soft';
      
      if(emis > 1.8 && h % 3 === 0) return 'glowring';
      if(div > 45 && h % 3 === 1) return 'pixelgrid';
      if(amp < 1.0 && h % 3 === 2) return 'nebula';
      if(freq < 1.5 && h % 2 === 0) return 'fractaltree';
      
      return 'elastic';
    }

    function extractFeatures(){
      let avgRms=0,maxRms=0,avgVel=0,maxVel=0,avgSpread=0,allText="";
      let pathPts=[],lastP=null;
      recordData.forEach(d=>{
        avgRms+=d.rms;if(d.rms>maxRms)maxRms=d.rms;
        let v=d.lwVel+d.rwVel;avgVel+=v;if(v>maxVel)maxVel=v;
        avgSpread+=(d.lSpread||0)+(d.rSpread||0);
        if(d.ono)allText+=d.ono;
        if(d.lw||d.rw){
          let posL=d.lw?d.lw.clone():new THREE.Vector3();
          let posR=d.rw?d.rw.clone():new THREE.Vector3();
          if(!lastP||(d.lw&&lastP.distanceTo(posL)>2)){pathPts.push({posL,posR,hasL:!!d.lw,hasR:!!d.rw});if(d.lw)lastP=posL.clone();}
        }
      });
      let n=recordData.length||1;avgRms/=n;avgVel/=n;avgSpread/=n;
      let match = findOnoParams(allText);
      let p, word = '';
      
      if(!match) {
        // 音量と手の動きからフォールバックオノマトペを仮想生成する
        let virtualOno = "";
        if(maxRms > 0.15) { // 大声
          if(maxVel > 12) {
            virtualOno = Math.random() > 0.5 ? "どんっ" : "ばきばき";
          } else if(avgSpread > 0.3) {
            virtualOno = "どかん";
          } else {
            virtualOno = Math.random() > 0.5 ? "どろどろ" : "ごろごろ";
          }
        } else if(maxRms > 0.03) { // 普通の声
          if(maxVel > 8) {
            virtualOno = Math.random() > 0.5 ? "しゅっ" : "くるくる";
          } else if(avgSpread > 0.25) {
            virtualOno = "ふわふわ";
          } else {
            virtualOno = Math.random() > 0.5 ? "じわり" : "もちもち";
          }
        } else { // 静か
          if(maxVel > 5) {
            virtualOno = "すーっ";
          } else {
            virtualOno = "そよそよ";
          }
        }
        match = findOnoParams(virtualOno);
      }
      
      if(match) {
        word = match.word;
        p = match.p;
      } else {
        word = "そよそよ";
        p = ONO_DB["そよそよ"];
      }

      let category = categorize(allText || word, p);
      let [h,s,l,vtx,freq,amp,div,ior,rough,metal,emis] = p;
      
      return {
        word,
        p,
        category,
        dom: category,
        avgRms,
        maxRms,
        avgVel,
        maxVel,
        avgSpread,
        pathPts,
        hue: h / 360,
        energy: Math.min(1.0, maxRms * 3.0 + maxVel / 15.0),
        sharpness: category === 'sharp' ? 1.0 : 0.0,
        roughness: category === 'rough' ? 1.0 : 0.0,
        softness: category === 'soft' ? 1.0 : 0.0,
        flow: (category === 'spiral' || category === 'nebula') ? 1.0 : 0.0
      };
    }

    class SceneGenerator {
      constructor(canvas) {
        this.canvas = canvas;
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
        this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        
        this.objects = [];
        this.animationId = null;
        
        window.addEventListener('resize', this.onResize.bind(this));
      }
      
      onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
      }
      
      clear() {
        if(this.animationId) {
          cancelAnimationFrame(this.animationId);
          this.animationId = null;
        }
        while(this.scene.children.length > 0) {
          const obj = this.scene.children[0];
          this.scene.remove(obj);
          if(obj.geometry) obj.geometry.dispose();
          if(obj.material) {
            if(Array.isArray(obj.material)) {
              obj.material.forEach(m => m.dispose());
            } else {
              obj.material.dispose();
            }
          }
        }
        this.objects = [];
      }

      _createEnvMap(color) {
        try {
          const pmremGenerator = new THREE.PMREMGenerator(this.renderer);
          pmremGenerator.compileEquirectangularShader();
          
          const canvas = document.createElement('canvas');
          canvas.width = 256;
          canvas.height = 128;
          const ctx = canvas.getContext('2d');
          const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
          
          const cTop = color.clone().multiplyScalar(1.5);
          cTop.r = Math.max(0, Math.min(1, cTop.r));
          cTop.g = Math.max(0, Math.min(1, cTop.g));
          cTop.b = Math.max(0, Math.min(1, cTop.b));
          const colTop = cTop.getStyle ? cTop.getStyle() : '#' + cTop.getHexString().padStart(6, '0');
          
          const cBottom = color.clone().multiplyScalar(0.2);
          cBottom.r = Math.max(0, Math.min(1, cBottom.r));
          cBottom.g = Math.max(0, Math.min(1, cBottom.g));
          cBottom.b = Math.max(0, Math.min(1, cBottom.b));
          const colBottom = cBottom.getStyle ? cBottom.getStyle() : '#' + cBottom.getHexString().padStart(6, '0');
          
          grad.addColorStop(0, colTop);
          grad.addColorStop(0.5, '#050508');
          grad.addColorStop(1, colBottom);
          
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          const texture = new THREE.CanvasTexture(canvas);
          texture.mapping = THREE.EquirectangularReflectionMapping;
          
          const envMap = pmremGenerator.fromEquirectangular(texture).texture;
          texture.dispose();
          pmremGenerator.dispose();
          
          return envMap;
        } catch (e) {
          console.warn("Failed to create envMap, falling back to null:", e);
          return null;
        }
      }

      generate() {
        this.clear();
        const f = extractFeatures();
        let [h,s,l,vtx,freq,amp,div,ior,rough,metal,emis] = f.p;
        
        // オノマトペと手の動きをより大袈裟に反映
        ior = Math.max(1.0, Math.min(3.0, ior + (Math.random() * 0.3 - 0.15)));
        
        const hue = h/360;
        const sat = Math.max(s/100, 0.7); // 鮮やかさを誇張
        const lit = Math.max(l/100, 0.5); // 明るさを誇張
        
        let baseColor = new THREE.Color().setHSL(hue, sat, lit);
        this.scene.environment = this._createEnvMap(baseColor);
        
        // 手の広がり、速度、声の大きさを大袈裟に乗算
        let spreadFactor = Math.min(f.avgSpread * 3.5, 5.0);
        let velFactor = Math.min(f.maxVel * 0.3, 4.0);
        let rmsFactor = Math.min(f.maxRms * 6.0, 4.0);
        let scaleMult = 1.0 + spreadFactor + velFactor + rmsFactor;
        
        let baseR = (60 + (div/60)*70) * scaleMult;
        
        let pc = new THREE.Vector3(), vpc=0;
        f.pathPts.forEach(pt=>{if(pt.hasL){pc.add(pt.posL);vpc++;}if(pt.hasR){pc.add(pt.posR);vpc++;}});
        if(vpc>0) pc.divideScalar(vpc);
        else pc.set(0,0,0);
        
        console.log(`[gen] word=${f.word} dom=${f.dom} scaleMult=${scaleMult.toFixed(2)} baseR=${baseR.toFixed(1)}`);
        
        // 背景色をベースカラーの極暗いHSLにして一体感を演出
        let bgColor = new THREE.Color().setHSL(hue, sat * 0.3, 0.02);
        this.scene.background = bgColor;
        this.scene.fog = new THREE.FogExp2(bgColor, 0.0015);
        
        let envGroup = new THREE.Group(); this.scene.add(envGroup);
        let mainGroup = new THREE.Group(); this.scene.add(mainGroup);
        
        // 照明を強化
        let lightIntensityMult = 1.0 + rmsFactor * 0.5 + velFactor * 0.3;
        let hemiLight = new THREE.HemisphereLight(0xffffff, 0x222233, 1.2 * lightIntensityMult); 
        this.scene.add(hemiLight);
        let dirLight = new THREE.DirectionalLight(0xffffff, 2.5 * lightIntensityMult); 
        dirLight.position.set(100, 300, 100); 
        this.scene.add(dirLight);
        let colorLight = new THREE.DirectionalLight(baseColor, 2.0 * lightIntensityMult);
        colorLight.position.set(-200, 50, -200);
        this.scene.add(colorLight);
        
        let pointLight = new THREE.PointLight(baseColor, (emis+1)*4 * lightIntensityMult, 3000); 
        pointLight.position.copy(pc).add(new THREE.Vector3(0,50,0)); 
        mainGroup.add(pointLight);

        // 軌跡リボン（3D Hand Ribbon）を描画
        let enhancedFreq = freq * (1.0 + velFactor * 0.5);
        let enhancedAmp = amp * (1.0 + rmsFactor * 0.8);
        this._buildHandRibbon(mainGroup, f, baseColor, metal, rough, emis, ior, enhancedFreq, enhancedAmp);
        
        // 演出パラメータも大袈裟に
        let enhancedEmis = emis + rmsFactor * 0.5;
        let enhancedMetal = Math.min(1.0, metal + velFactor * 0.1);
        let enhancedRough = Math.max(0.0, rough - rmsFactor * 0.05);
        
        switch(f.category) {
          case 'impact': this._buildImpact(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'sharp':  this._buildSharp(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'spiral': this._buildSpiral(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'liquid': this._buildLiquid(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'elastic':this._buildElastic(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'rough':  this._buildRough(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'emotion':this._buildEmotion(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'soft':   this._buildSoft(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          
          case 'glowring':    this._buildGlowRing(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'pixelgrid':   this._buildPixelGrid(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'nebula':      this._buildNebula(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          case 'fractaltree': this._buildFractalTree(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
          
          default:       this._buildSoft(mainGroup, envGroup, pc, baseR, baseColor, f, enhancedMetal, enhancedRough, enhancedEmis); break;
        }

        // カメラターゲットの調整（真ん中を中心に）
        mainGroup.add(new THREE.Object3D());
        let box3 = new THREE.Box3().setFromObject(mainGroup);
        let bc = new THREE.Vector3(), bs = new THREE.Vector3();
        if(!box3.isEmpty()){
            box3.getCenter(bc);
            box3.getSize(bs);
        } else {
            bc.copy(pc);
            bs.set(100, 100, 100);
        }
        this.controls.target.copy(bc);
        
        let maxDim = Math.max(bs.x, bs.y, bs.z);
        let camDist = Math.max(150, maxDim * 1.1);
        this.camera.position.set(bc.x, bc.y + camDist * 0.3, bc.z + camDist * 1.1);
        this.camera.lookAt(bc);
        this.controls.update(); 
        this.camera.updateProjectionMatrix();
        
        this.animate = this.animate.bind(this); 
        this.animate();
      }

      _buildHandRibbon(mainGroup, f, baseColor, metal, rough, emis, ior, freq, amp) {
        if (!f.pathPts || f.pathPts.length < 3) return;
        const hue = f.p[0]/360;
        const group = new THREE.Group();
        
        // 1. 左右の手の軌跡をつなぐ 3D リボンメッシュ
        const geom = new THREE.BufferGeometry();
        const vertices = [];
        const colors = [];
        const indices = [];
        
        f.pathPts.forEach((pt, i) => {
          let posL = pt.posL;
          let posR = pt.posR;
          vertices.push(posL.x, posL.y, posL.z);
          vertices.push(posR.x, posR.y, posR.z);
          
          let ratio = i / f.pathPts.length;
          let cL = new THREE.Color().setHSL((hue + ratio * 0.3) % 1, 1.0, 0.6);
          let cR = new THREE.Color().setHSL((hue + ratio * 0.3 + 0.15) % 1, 1.0, 0.5);
          colors.push(cL.r, cL.g, cL.b);
          colors.push(cR.r, cR.g, cR.b);
          
          if (i > 0) {
            let prev = (i - 1) * 2;
            let curr = i * 2;
            indices.push(prev, prev + 1, curr);
            indices.push(prev + 1, curr + 1, curr);
            indices.push(prev, curr, prev + 1);
            indices.push(prev + 1, curr, curr + 1);
          }
        });
        geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geom.setIndex(indices);
        geom.computeVertexNormals();
        
        // オノマトペの物理特性をリボン素材に厳密に反映
        const mat = new THREE.MeshPhysicalMaterial({
          vertexColors: true,
          roughness: Math.max(0.01, rough),
          metalness: Math.max(0.05, metal),
          clearcoat: 1.0,
          clearcoatRoughness: Math.max(0.01, rough * 0.5),
          transmission: ior > 1.8 ? 0.05 : 0.4,
          opacity: 0.9,
          transparent: true,
          iridescence: 0.9,
          iridescenceIOR: ior,
          iridescenceThicknessRange: [100, 400],
          side: THREE.DoubleSide
        });
        const ribbonMesh = new THREE.Mesh(geom, mat);
        group.add(ribbonMesh);
        
        // 2. 左手・右手それぞれの滑らかなネオンチューブ
        const ptsL = f.pathPts.map(p => p.posL);
        const ptsR = f.pathPts.map(p => p.posR);
        const seedVal = this._getSeed(f.word);
        
        const createTube = (pts, offsetColor) => {
          const curve = new THREE.CatmullRomCurve3(pts);
          const rad = 2.0 + f.maxRms * 12 + seedVal * 3;
          const tubeGeom = new THREE.TubeGeometry(curve, 100, rad, 8, false);
          
          // チューブをオノマトペのうねり（freq, amp）でノイズ変形
          const pos = tubeGeom.attributes.position;
          const vec = new THREE.Vector3();
          for(let i=0; i<pos.count; i++) {
            vec.fromBufferAttribute(pos, i);
            let noise = Math.sin(vec.x * (0.01 + freq * 0.005) + seedVal * 10) * Math.cos(vec.z * (0.01 + freq * 0.005) + seedVal * 10) * (amp * 1.5);
            vec.x += noise; vec.y += noise;
            pos.setXYZ(i, vec.x, vec.y, vec.z);
          }
          tubeGeom.computeVertexNormals();
          
          const tubeMat = new THREE.MeshPhysicalMaterial({
            color: offsetColor,
            emissive: offsetColor,
            emissiveIntensity: emis + f.energy * 2.0,
            roughness: Math.max(0.01, rough),
            metalness: Math.max(0.05, metal),
            clearcoat: 1.0,
            clearcoatRoughness: Math.max(0.01, rough * 0.5),
            transmission: ior > 1.8 ? 0.1 : 0.6,
            transparent: true,
            opacity: 0.85,
            iridescence: 0.7,
            iridescenceIOR: ior
          });
          group.add(new THREE.Mesh(tubeGeom, tubeMat));
        };
        
        createTube(ptsL, new THREE.Color().setHSL(hue, 1.0, 0.6));
        createTube(ptsR, new THREE.Color().setHSL((hue + 0.5) % 1, 1.0, 0.6));
        
        // 3. 左右を結ぶネオン接続線
        const webGeom = new THREE.BufferGeometry();
        const webVertices = [];
        const webColors = [];
        f.pathPts.forEach((pt, i) => {
          if (i % 2 === 0) {
            webVertices.push(pt.posL.x, pt.posL.y, pt.posL.z);
            webVertices.push(pt.posR.x, pt.posR.y, pt.posR.z);
            let c = new THREE.Color().setHSL((hue + 0.25) % 1, 1.0, 0.7);
            webColors.push(c.r, c.g, c.b, c.r, c.g, c.b);
          }
        });
        webGeom.setAttribute('position', new THREE.Float32BufferAttribute(webVertices, 3));
        webGeom.setAttribute('color', new THREE.Float32BufferAttribute(webColors, 3));
        const webMat = new THREE.LineBasicMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 0.5 + f.energy * 0.5,
          blending: THREE.AdditiveBlending
        });
        group.add(new THREE.LineSegments(webGeom, webMat));
        
        mainGroup.add(group);
        
        // オノマトペ固有のアニメーション変形を適用
        this.objects.push({
          mesh: ribbonMesh,
          isRibbon: true,
          baseGeo: geom.clone(),
          freq: (0.01 + freq * 0.008) * (0.85 + Math.random() * 0.3),
          amp: (2.0 + amp * 12) * (0.85 + Math.random() * 0.3)
        });
      }

      _addStars(envGroup, cnt, hexColor) {
        let sg=new THREE.BufferGeometry();
        let arr=new Float32Array(cnt*3);
        for(let i=0;i<cnt;i++){arr[i*3]=(Math.random()-0.5)*4000;arr[i*3+1]=(Math.random()-0.5)*4000;arr[i*3+2]=(Math.random()-0.5)*4000;}
        sg.setAttribute('position',new THREE.BufferAttribute(arr,3));
        let sm=new THREE.PointsMaterial({size:4.0, color:hexColor||0xffffff, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false});
        envGroup.add(new THREE.Points(sg,sm));
      }

      _getSeed(word) {
        let hash = 0;
        for (let i = 0; i < word.length; i++) {
          hash = word.charCodeAt(i) + ((hash << 5) - hash);
        }
        return Math.abs(hash % 1000) / 1000;
      }

      _buildImpact(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.fog = new THREE.FogExp2(0x0a0303, 0.001);
        this._addStars(envGroup, 1500, 0xff5500);
        let seed = this._getSeed(f.word);
        
        let floorG = new THREE.PlaneGeometry(3500, 3500, 100, 100);
        let floorM = new THREE.MeshPhysicalMaterial({
          color: 0x150b0b, roughness: 0.85, metalness: 0.5, 
          emissive: 0x330a00, emissiveIntensity: 0.5
        });
        let floor = new THREE.Mesh(floorG, floorM);
        floor.rotation.x = -Math.PI/2; floor.position.y = pc.y - 120;
        let pos = floorG.attributes.position;
        for(let i=0; i<pos.count; i++) {
          let x = pos.getX(i), y = pos.getY(i);
          let nz = Math.sin(x*0.005 + seed*5)*Math.cos(y*0.005 + seed*5)*180
                 + Math.sin(x*0.015)*Math.sin(y*0.015)*45;
          pos.setZ(i, pos.getZ(i) + nz);
        }
        floorG.computeVertexNormals(); envGroup.add(floor);
        
        let ringG = new THREE.RingGeometry(baseR*1.5, baseR*2.5, 64);
        let ringM = new THREE.MeshBasicMaterial({color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending});
        let ring = new THREE.Mesh(ringG, ringM);
        ring.rotation.x = -Math.PI/2; ring.position.copy(pc);
        mainGroup.add(ring);
        this.objects.push({mesh: ring, rx: 0.005, ry: 0.01, isRhythmic: true, baseEmis: 1.0});

        let numPillars = 25 + Math.floor(f.avgSpread*30);
        let shardG = new THREE.TetrahedronGeometry(35 + seed*40, 1);
        let shardM = new THREE.MeshPhysicalMaterial({
          color: 0x1c1c1c, roughness: 0.9, metalness: 0.8,
          emissive: color, emissiveIntensity: emis * 1.5,
          clearcoat: 1.0
        });
        let inst = new THREE.InstancedMesh(shardG, shardM, numPillars);
        let dm = new THREE.Object3D();
        for(let i=0; i<numPillars; i++) {
          let r = baseR * 1.5 + Math.random() * 800;
          let ang = Math.random() * Math.PI * 2;
          dm.position.set(pc.x + Math.cos(ang)*r, pc.y - 100 + (Math.random()-0.3)*400, pc.z + Math.sin(ang)*r);
          dm.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
          dm.scale.setScalar(0.5 + Math.random()*2.0);
          dm.updateMatrix(); inst.setMatrixAt(i, dm.matrix);
        }
        mainGroup.add(inst);
        this.objects.push({mesh: inst, isRhythmic: true, baseEmis: emis*1.5});
      }

      _buildSharp(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x03080e);
        this.scene.fog = new THREE.FogExp2(0x03080e, 0.001);
        this._addStars(envGroup, 2000, 0x88e0ff);
        let seed = this._getSeed(f.word);

        let floorG = new THREE.PlaneGeometry(3000, 3000, 50, 50);
        let floorM = new THREE.MeshPhysicalMaterial({color: 0x223344, roughness: 0.1, metalness: 0.9, flatShading: true});
        let floor = new THREE.Mesh(floorG, floorM);
        floor.rotation.x = -Math.PI/2; floor.position.y = pc.y - 120;
        let pos = floorG.attributes.position;
        for(let i=0; i<pos.count; i++) pos.setZ(i, pos.getZ(i) + (Math.random()-0.5)*40);
        floorG.computeVertexNormals(); envGroup.add(floor);

        let crystalMat = new THREE.MeshPhysicalMaterial({
          color: color, roughness: 0.01, metalness: 1.0,
          transmission: 0.6, ior: 2.65, thickness: 25.0,
          clearcoat: 1.0, clearcoatRoughness: 0.01,
          sheen: 1.0, sheenColor: new THREE.Color(0xffffff),
          iridescence: 1.0, iridescenceIOR: 2.0,
          iridescenceThicknessRange: [150, 400]
        });

        let numSpikes = 120 + Math.floor(f.avgSpread * 100);
        let spikeG = new THREE.ConeGeometry(baseR * 0.18, baseR * (3.0 + seed*3.0), 5, 1);
        let inst = new THREE.InstancedMesh(spikeG, crystalMat, numSpikes);
        let dm = new THREE.Object3D();
        
        for(let i=0; i<numSpikes; i++) {
          let ptIdx = Math.floor(Math.random() * f.pathPts.length);
          let origin = f.pathPts[ptIdx] ? f.pathPts[ptIdx].posL : pc;
          let dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.3, Math.random()-0.5).normalize();
          let dist = baseR * (0.3 + Math.random()*0.8);
          dm.position.copy(origin).addScaledVector(dir, dist);
          dm.scale.set(1.0 + Math.random(), 0.5 + Math.random()*2.0, 1.0 + Math.random());
          dm.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
          dm.updateMatrix(); inst.setMatrixAt(i, dm.matrix);
        }
        mainGroup.add(inst);
        this.objects.push({mesh: mainGroup, ry: 0.003 + seed*0.005});
      }

      _buildSpiral(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x020211);
        this.scene.fog = new THREE.FogExp2(0x020211, 0.0008);
        this._addStars(envGroup, 4000, 0x99ccff);
        let seed = this._getSeed(f.word);

        let numStrands = 5 + Math.floor(seed * 5);
        let points = [];
        let r = baseR * 3.5;
        for(let i=0; i<200; i++) {
          let a = i * 0.15;
          let pr = r * (1.0 + i*0.008);
          points.push(new THREE.Vector3(Math.cos(a)*pr, (i-100)*7, Math.sin(a)*pr));
        }
        
        let tubeMat = new THREE.MeshPhysicalMaterial({
          color: color, metalness: 0.8, roughness: 0.1,
          transmission: 0.5, ior: 1.8, thickness: 8.0,
          emissive: color, emissiveIntensity: 0.4,
          clearcoat: 1.0
        });

        for(let s=0; s<numStrands; s++) {
          let offsetPoints = points.map((p, idx) => {
            let angle = (idx * 0.1) + (s * (Math.PI * 2 / numStrands));
            let offsetR = baseR * (0.6 + seed * 0.8);
            return new THREE.Vector3(
              p.x + Math.cos(angle)*offsetR,
              p.y + (Math.random()-0.5)*15,
              p.z + Math.sin(angle)*offsetR
            );
          });
          let strandCurve = new THREE.CatmullRomCurve3(offsetPoints);
          let geo = new THREE.TubeGeometry(strandCurve, 150, baseR * 0.3, 8, false);
          let mesh = new THREE.Mesh(geo, tubeMat);
          mesh.position.copy(pc);
          mainGroup.add(mesh);
          this.objects.push({mesh: mesh, ry: 0.01 + (s*0.005) + f.avgVel*0.002});
        }

        let pCount = 3000;
        let pg = new THREE.BufferGeometry();
        let pPos = new Float32Array(pCount * 3);
        let pMeta = [];
        for(let i=0; i<pCount; i++) {
          let rad = baseR * (1.5 + Math.random()*5.0);
          let ang = Math.random() * Math.PI * 2;
          let y = (Math.random() - 0.5) * 1200;
          let speed = 0.5 + Math.random()*1.5;
          pMeta.push({rad, ang, speed, y});
          pPos[i*3] = Math.cos(ang)*rad;
          pPos[i*3+1] = y;
          pPos[i*3+2] = Math.sin(ang)*rad;
        }
        pg.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        let pm = new THREE.PointsMaterial({
          size: 3.5, color: color, transparent: true, opacity: 0.8,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        let pSystem = new THREE.Points(pg, pm);
        pSystem.position.copy(pc);
        mainGroup.add(pSystem);
        this.objects.push({mesh: pSystem, isSpiralParticles: true, pMeta: pMeta, baseR: baseR});
      }

      _buildLiquid(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        let liqColor = color.clone().lerp(new THREE.Color(0x00aaff), 0.4);
        this.scene.background = liqColor.clone().multiplyScalar(0.08);
        this.scene.fog = new THREE.FogExp2(this.scene.background, 0.001);
        let seed = this._getSeed(f.word);

        let pg = new THREE.PlaneGeometry(3500, 3500, 100, 100);
        let pm = new THREE.MeshPhysicalMaterial({
          color: liqColor, transmission: 0.96, opacity: 1.0, metalness: 0.1, 
          roughness: 0.01, ior: 1.52, thickness: 25.0, clearcoat: 1.0,
          iridescence: 0.95, iridescenceIOR: 1.6,
          iridescenceThicknessRange: [100, 400]
        });
        let plane = new THREE.Mesh(pg, pm);
        plane.rotation.x = -Math.PI/2; plane.position.y = pc.y - 100; 
        envGroup.add(plane);
        this.objects.push({mesh: plane, isWavePlane: true, baseGeo: pg.clone(), amp: baseR * 1.8, freq: 0.012 + seed*0.01});

        let mercuryMat = new THREE.MeshPhysicalMaterial({
          color: 0xeeeeee, metalness: 1.0, roughness: 0.01,
          clearcoat: 1.0, clearcoatRoughness: 0.01,
          envMapIntensity: 2.0,
          iridescence: 0.6, iridescenceIOR: 1.8
        });
        let dropG = new THREE.SphereGeometry(baseR * (1.2 + seed*0.8), 64, 64);
        let centralDrop = new THREE.Mesh(dropG, mercuryMat);
        centralDrop.position.copy(pc).add(new THREE.Vector3(0, baseR * 0.5, 0));
        mainGroup.add(centralDrop);
        this.objects.push({mesh: centralDrop, isSquishy: true, baseGeo: dropG.clone(), amp: baseR*0.4, freq: 0.03});

        let numBubbles = 150 + Math.floor(f.avgSpread*80);
        let bubbleG = new THREE.SphereGeometry(baseR*0.25, 16, 16);
        let inst = new THREE.InstancedMesh(bubbleG, pm, numBubbles);
        let dm = new THREE.Object3D();
        let bubbleMeta = [];
        for(let i=0; i<numBubbles; i++) {
          let x = pc.x + (Math.random()-0.5)*1200;
          let y = pc.y - 100 + Math.random()*800;
          let z = pc.z + (Math.random()-0.5)*1200;
          let speed = 1.0 + Math.random()*2.0;
          bubbleMeta.push({x, y, z, speed});
          dm.position.set(x, y, z);
          dm.scale.setScalar(0.4 + Math.random()*1.8);
          dm.updateMatrix(); inst.setMatrixAt(i, dm.matrix);
        }
        mainGroup.add(inst);
        this.objects.push({mesh: inst, isDropletsInstanced: true, bubbleMeta: bubbleMeta, minY: pc.y - 100, maxY: pc.y + 700});
      }

      _buildElastic(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x180218);
        this.scene.fog = new THREE.FogExp2(0x180218, 0.001);
        this._addStars(envGroup, 1500, 0xff88ee);
        let seed = this._getSeed(f.word);

        let fg = new THREE.PlaneGeometry(3000, 3000, 80, 80);
        let fm = new THREE.MeshPhysicalMaterial({
          color: 0xff44aa, roughness: 0.05, metalness: 0.1,
          transmission: 0.4, thickness: 10, clearcoat: 1.0
        });
        let floor = new THREE.Mesh(fg, fm);
        floor.rotation.x = -Math.PI/2; floor.position.y = pc.y - 120; envGroup.add(floor);
        this.objects.push({mesh: floor, isWavePlane: true, baseGeo: fg.clone(), amp: baseR*0.9, freq: 0.015});

        let jellyMat = new THREE.MeshPhysicalMaterial({
          color: color, transmission: 0.9, roughness: 0.01, 
          ior: 1.48, thickness: 30.0, clearcoat: 1.0,
          clearcoatRoughness: 0.01,
          iridescence: 0.85, iridescenceIOR: 1.5,
          iridescenceThicknessRange: [100, 300]
        });

        let kg = new THREE.TorusKnotGeometry(baseR*1.6, baseR*0.7, 180, 48, 3, 4);
        let knot = new THREE.Mesh(kg, jellyMat);
        knot.position.copy(pc); mainGroup.add(knot);
        this.objects.push({mesh: knot, isSquishy: true, baseGeo: kg.clone(), amp: baseR * (0.4 + seed*0.4), freq: 0.035, ry: 0.01});

        let numGummies = 80 + Math.floor(f.avgSpread*50);
        let gumG = new THREE.SphereGeometry(baseR*0.4, 32, 32);
        let gumMat = new THREE.MeshPhysicalMaterial({
          color: new THREE.Color().setHSL((seed + 0.5)%1, 1.0, 0.6),
          transmission: 0.95, roughness: 0.02, ior: 1.45, clearcoat: 1.0,
          iridescence: 0.7, iridescenceIOR: 1.4
        });
        let inst = new THREE.InstancedMesh(gumG, gumMat, numGummies);
        let dm = new THREE.Object3D();
        for(let i=0; i<numGummies; i++) {
          dm.position.set(pc.x+(Math.random()-0.5)*900, pc.y+(Math.random()-0.4)*600, pc.z+(Math.random()-0.5)*900);
          dm.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
          dm.scale.setScalar(0.6 + Math.random()*1.6);
          dm.updateMatrix(); inst.setMatrixAt(i, dm.matrix);
        }
        mainGroup.add(inst);
      }

      _buildRough(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x060608);
        this.scene.fog = new THREE.FogExp2(0x060608, 0.001);
        this._addStars(envGroup, 2000, 0xbbbbbb);
        let seed = this._getSeed(f.word);

        let fg = new THREE.PlaneGeometry(3500, 3500, 80, 80);
        let rm = new THREE.MeshStandardMaterial({color: 0x222225, roughness: 0.9, metalness: 0.3, flatShading: true});
        let floor = new THREE.Mesh(fg, rm);
        floor.rotation.x = -Math.PI/2; floor.position.y = pc.y - 150;
        let pos = fg.attributes.position;
        for(let i=0; i<pos.count; i++) {
          let x = pos.getX(i), y = pos.getY(i);
          let noise = Math.sin(x*0.015)*Math.cos(y*0.015)*90 + (Math.sin(x*0.06)*Math.sin(y*0.06)*25);
          pos.setZ(i, pos.getZ(i) + noise);
        }
        fg.computeVertexNormals(); envGroup.add(floor);

        let rockG = new THREE.DodecahedronGeometry(baseR * 1.3, 3);
        let posR = rockG.attributes.position;
        for(let i=0; i<posR.count; i++) {
          let v = new THREE.Vector3().fromBufferAttribute(posR, i);
          let n = Math.sin(v.x*0.08 + seed*10)*Math.cos(v.y*0.08)*Math.sin(v.z*0.08)*baseR*0.45;
          v.addScaledVector(v.clone().normalize(), n);
          posR.setXYZ(i, v.x, v.y, v.z);
        }
        rockG.computeVertexNormals();
        
        let rockMesh = new THREE.Mesh(rockG, rm);
        rockMesh.position.copy(pc);
        mainGroup.add(rockMesh);
        this.objects.push({mesh: rockMesh, ry: 0.005, rx: 0.002});

        let wireMat = new THREE.MeshBasicMaterial({color: color, wireframe: true, transparent: true, opacity: 0.4 + emis*0.3});
        let wireMesh = new THREE.Mesh(rockG, wireMat);
        wireMesh.position.copy(pc); wireMesh.scale.setScalar(1.005);
        mainGroup.add(wireMesh);

        let numAsteroids = 100 + Math.floor(f.avgSpread*60);
        let astG = new THREE.DodecahedronGeometry(baseR*0.3, 1);
        let inst = new THREE.InstancedMesh(astG, rm, numAsteroids);
        let dm = new THREE.Object3D();
        for(let i=0; i<numAsteroids; i++) {
          dm.position.set(pc.x+(Math.random()-0.5)*1500, pc.y+(Math.random()-0.3)*700, pc.z+(Math.random()-0.5)*1500);
          dm.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
          dm.scale.setScalar(0.4 + Math.random()*1.6);
          dm.updateMatrix(); inst.setMatrixAt(i, dm.matrix);
        }
        mainGroup.add(inst);
      }

      _buildEmotion(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x11001c);
        this.scene.fog = new THREE.FogExp2(0x11001c, 0.001);
        this._addStars(envGroup, 2500, 0xff55aa);
        let seed = this._getSeed(f.word);

        let coreMat = new THREE.MeshPhysicalMaterial({
          color: color, emissive: color, emissiveIntensity: 2.0,
          roughness: 0.05, metalness: 0.8, transmission: 0.3, ior: 1.8,
          clearcoat: 1.0, clearcoatRoughness: 0.05,
          iridescence: 0.8, iridescenceIOR: 1.6
        });
        let kg = new THREE.TorusKnotGeometry(baseR * 1.5, baseR * 0.45, 200, 64, 3, 5);
        let knot = new THREE.Mesh(kg, coreMat);
        knot.position.copy(pc); mainGroup.add(knot);
        this.objects.push({mesh: knot, isHeartbeat: true, ry: 0.015});

        let shellG = new THREE.IcosahedronGeometry(baseR * 2.2, 2);
        let shellMat = new THREE.MeshPhysicalMaterial({
          color: 0xffffff, transmission: 0.95, opacity: 0.85,
          roughness: 0.02, clearcoat: 1.0, clearcoatRoughness: 0.02,
          iridescence: 1.0, iridescenceIOR: 1.5, side: THREE.DoubleSide
        });
        let shell = new THREE.Mesh(shellG, shellMat);
        shell.position.copy(pc); mainGroup.add(shell);
        this.objects.push({mesh: shell, isHeartbeat: true, ry: -0.005, rx: 0.005});

        let numCubes = 120 + Math.floor(f.avgSpread*80);
        let cubeG = new THREE.BoxGeometry(baseR*0.25, baseR*0.25, baseR*0.25);
        let cubeM = new THREE.MeshPhysicalMaterial({
          color: color, emissive: color, emissiveIntensity: emis*2.0,
          roughness: 0.2, metalness: 0.8
        });
        let inst = new THREE.InstancedMesh(cubeG, cubeM, numCubes);
        let dm = new THREE.Object3D();
        for(let i=0; i<numCubes; i++) {
          dm.position.set(pc.x+(Math.random()-0.5)*1300, pc.y+(Math.random()-0.5)*900, pc.z+(Math.random()-0.5)*1300);
          dm.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
          dm.scale.setScalar(0.5 + Math.random()*1.8);
          dm.updateMatrix(); inst.setMatrixAt(i, dm.matrix);
        }
        mainGroup.add(inst);
        this.objects.push({mesh: inst, isHeartbeatInst: true, baseEmis: emis*2.0});
      }

      _buildSoft(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x111622);
        this.scene.fog = new THREE.FogExp2(0x111622, 0.0008);
        let seed = this._getSeed(f.word);

        let bubbleMat = new THREE.MeshPhysicalMaterial({
          color: 0xffffff, roughness: 0.01, metalness: 0.1,
          transmission: 0.98, ior: 1.45, thickness: 10.0,
          iridescence: 1.0, iridescenceIOR: 1.6, iridescenceThicknessRange: [100, 400],
          transparent: true, opacity: 0.9
        });

        let numBubbles = 20 + Math.floor(f.avgSpread * 15);
        for(let i=0; i<numBubbles; i++) {
          let size = baseR * (0.8 + Math.random() * 1.5);
          let bubbleG = new THREE.SphereGeometry(size, 32, 32);
          let mesh = new THREE.Mesh(bubbleG, bubbleMat);
          mesh.position.set(pc.x+(Math.random()-0.5)*1000, pc.y+(Math.random())*500, pc.z+(Math.random()-0.5)*1000);
          mainGroup.add(mesh);
          this.objects.push({mesh: mesh, isCloud: true, bobOffset: Math.random()*Math.PI*2});
        }

        let pCount = 2000;
        let pg = new THREE.BufferGeometry();
        let pPos = new Float32Array(pCount * 3);
        for(let i=0; i<pCount; i++) {
          pPos[i*3] = pc.x + (Math.random()-0.5)*1600;
          pPos[i*3+1] = pc.y + (Math.random()-0.2)*800;
          pPos[i*3+2] = pc.z + (Math.random()-0.5)*1600;
        }
        pg.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        let pm = new THREE.PointsMaterial({
          size: 6.0, color: color, transparent: true, opacity: 0.4,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        let clouds = new THREE.Points(pg, pm);
        envGroup.add(clouds);
        this.objects.push({mesh: clouds, isCloud: true, bobOffset: 0});
      }

      _buildGlowRing(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x020205);
        this.scene.fog = new THREE.FogExp2(0x020205, 0.001);
        this._addStars(envGroup, 1500, 0x00ffff);
        let seed = this._getSeed(f.word);

        let numRings = 8 + Math.floor(seed * 8);
        for(let i=0; i<numRings; i++) {
          let ringRad = baseR * (0.8 + i * 0.4);
          let ringG = new THREE.TorusGeometry(ringRad, 2.5 + seed*2, 16, 100);
          
          let ringColor = new THREE.Color().setHSL((seed + i/numRings) % 1.0, 1.0, 0.6);
          let ringM = new THREE.MeshPhysicalMaterial({
            color: ringColor,
            emissive: ringColor,
            emissiveIntensity: 2.0 + emis,
            roughness: 0.05,
            metalness: 0.9,
            clearcoat: 1.0,
            transparent: true,
            opacity: 0.8,
            iridescence: 0.8,
            iridescenceIOR: 1.5
          });
          
          let mesh = new THREE.Mesh(ringG, ringM);
          mesh.position.copy(pc);
          mesh.rotation.set(seed * Math.PI + i*0.2, (seed * 0.5) * Math.PI, 0);
          mainGroup.add(mesh);
          this.objects.push({
            mesh: mesh,
            rx: 0.005 + i*0.002,
            ry: -0.003 - i*0.001,
            isGlowRing: true,
            baseEmis: 2.0 + emis
          });
        }
      }

      _buildPixelGrid(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x05080c);
        this.scene.fog = new THREE.FogExp2(0x05080c, 0.0008);
        this._addStars(envGroup, 1200, color);
        let seed = this._getSeed(f.word);

        let boxSize = baseR * 0.25;
        let gridG = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
        let gridM = new THREE.MeshPhysicalMaterial({
          color: color,
          emissive: color,
          emissiveIntensity: 0.5 + emis,
          roughness: 0.2,
          metalness: 0.8,
          clearcoat: 1.0,
          clearcoatRoughness: 0.1
        });

        let cols = 6 + Math.floor(seed * 6);
        let instCount = cols * cols * 3;
        let inst = new THREE.InstancedMesh(gridG, gridM, instCount);
        let dm = new THREE.Object3D();
        
        let idx = 0;
        let spacing = boxSize * 1.5;
        for(let x=0; x<cols; x++) {
          for(let z=0; z<cols; z++) {
            for(let y=0; y<3; y++) {
              let posX = pc.x + (x - cols/2) * spacing;
              let posZ = pc.z + (z - cols/2) * spacing;
              let heightOffset = Math.sin(x*0.5 + seed*5)*Math.cos(z*0.5 + seed*5)*boxSize*2.0;
              let posY = pc.y + (y - 1) * spacing + heightOffset;
              
              dm.position.set(posX, posY, posZ);
              dm.rotation.set(0, 0, 0);
              dm.scale.setScalar(0.7 + Math.random()*0.6);
              dm.updateMatrix();
              inst.setMatrixAt(idx++, dm.matrix);
            }
          }
        }
        mainGroup.add(inst);
        this.objects.push({
          mesh: inst,
          ry: 0.002,
          isPixelGrid: true,
          cols: cols,
          spacing: spacing,
          boxSize: boxSize,
          seed: seed,
          pc: pc
        });
      }

      _buildNebula(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x020008);
        this.scene.fog = new THREE.FogExp2(0x020008, 0.0005);
        let seed = this._getSeed(f.word);

        let pCount = 5000 + Math.floor(seed * 8000);
        let pg = new THREE.BufferGeometry();
        let pPos = new Float32Array(pCount * 3);
        let pColors = new Float32Array(pCount * 3);
        
        let c1 = color;
        let c2 = new THREE.Color().setHSL((seed + 0.3)%1, 1.0, 0.6);
        let c3 = new THREE.Color(0x00ffff);
        
        for(let i=0; i<pCount; i++) {
          let progress = i / pCount;
          let ang = progress * Math.PI * 40.0 + seed * 10;
          let rad = baseR * 0.5 + progress * baseR * 6.0;
          let spread = (1.0 - progress) * baseR * 1.5 + 20;
          
          let x = pc.x + Math.cos(ang) * rad + (Math.random() - 0.5) * spread;
          let y = pc.y + (Math.random() - 0.5) * spread + progress * 200 - 100;
          let z = pc.z + Math.sin(ang) * rad + (Math.random() - 0.5) * spread;
          
          pPos[i*3] = x;
          pPos[i*3+1] = y;
          pPos[i*3+2] = z;
          
          let mixColor = c1.clone().lerp(c2, progress);
          if(Math.random() > 0.7) mixColor.lerp(c3, 0.5);
          pColors[i*3] = mixColor.r;
          pColors[i*3+1] = mixColor.g;
          pColors[i*3+2] = mixColor.b;
        }
        
        pg.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pg.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
        
        let pm = new THREE.PointsMaterial({
          size: 4.0 + seed*4.0,
          vertexColors: true,
          transparent: true,
          opacity: 0.65,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        
        let system = new THREE.Points(pg, pm);
        mainGroup.add(system);
        this.objects.push({
          mesh: system,
          ry: 0.003,
          isNebula: true,
          pPos: pPos,
          seed: seed,
          pc: pc
        });
      }

      _buildFractalTree(mainGroup, envGroup, pc, baseR, color, f, metal, rough, emis) {
        this.scene.background = new THREE.Color(0x050b06);
        this.scene.fog = new THREE.FogExp2(0x050b06, 0.001);
        this._addStars(envGroup, 1000, 0xaaff88);
        let seed = this._getSeed(f.word);

        let treeGroup = new THREE.Group();
        treeGroup.position.copy(pc);
        mainGroup.add(treeGroup);

        let branchMat = new THREE.MeshPhysicalMaterial({
          color: color,
          metalness: 0.9,
          roughness: 0.1,
          clearcoat: 1.0,
          iridescence: 0.9,
          iridescenceIOR: 1.6,
          transmission: 0.3
        });
        let leafMat = new THREE.MeshPhysicalMaterial({
          color: new THREE.Color().setHSL((seed + 0.33) % 1.0, 1.0, 0.5),
          emissive: new THREE.Color().setHSL((seed + 0.33) % 1.0, 1.0, 0.3),
          roughness: 0.01,
          metalness: 0.1,
          transmission: 0.95,
          ior: 1.5,
          clearcoat: 1.0
        });

        const buildBranch = (start, dir, length, rad, depth) => {
          if (depth > 5) return;
          
          let end = start.clone().addScaledVector(dir, length);
          let path = new THREE.CatmullRomCurve3([start, end]);
          let geom = new THREE.TubeGeometry(path, 8, rad, 6, false);
          let mesh = new THREE.Mesh(geom, branchMat);
          treeGroup.add(mesh);

          if(depth === 5) {
            let leafG = new THREE.SphereGeometry(rad * 4.0, 12, 12);
            let leaf = new THREE.Mesh(leafG, leafMat);
            leaf.position.copy(end);
            treeGroup.add(leaf);
          }

          let numBranches = 2;
          for(let i=0; i<numBranches; i++) {
            let angle = (0.3 + seed * 0.2) * (i === 0 ? 1 : -1);
            let nextDir = dir.clone().applyAxisAngle(new THREE.Vector3(0, 0, 1), angle);
            nextDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), Math.random() * Math.PI);
            nextDir.normalize();
            buildBranch(end, nextDir, length * 0.72, rad * 0.65, depth + 1);
          }
        };

        let startPt = new THREE.Vector3(0, -100, 0);
        let startDir = new THREE.Vector3(0, 1, 0);
        buildBranch(startPt, startDir, baseR * 3.5, baseR * 0.2, 0);

        this.objects.push({
          mesh: treeGroup,
          ry: 0.005,
          isFractalTree: true
        });
      }


      animate() {
        this.animationId=requestAnimationFrame(this.animate);this.controls.update();
        let t=performance.now()*0.001;
        for(let obj of this.objects){
          if(obj.ry)obj.mesh.rotation.y+=obj.ry;if(obj.rx)obj.mesh.rotation.x+=obj.rx;
          
          if(obj.isPillar) {
            obj.mesh.position.y += (obj.tgtY - obj.mesh.position.y) * obj.speed;
          }
          if(obj.isRhythmic) {
            let beat = Math.pow(Math.sin(t*Math.PI*2.0)*0.5+0.5, 8);
            obj.mesh.material.emissiveIntensity = obj.baseEmis + beat*5;
            let sc = 1 + beat*0.1; obj.mesh.scale.set(sc,sc,sc);
          }
          if(obj.isHeartbeat) {
            let beat = Math.pow(Math.sin(t*Math.PI*1.5)*0.5+0.5, 4);
            let sc = 1 + beat*0.15; obj.mesh.scale.set(sc,sc,sc);
          }
          if(obj.isHeartbeatInst) {
            let beat = Math.pow(Math.sin(t*Math.PI*1.5)*0.5+0.5, 4);
            obj.mesh.material.emissiveIntensity = obj.baseEmis + beat*3.0;
          }
          if(obj.isWavePlane && obj.baseGeo) {
            let pos=obj.mesh.geometry.attributes.position,base=obj.baseGeo.attributes.position;
            let v=new THREE.Vector3(), f2=obj.freq;
            for(let i=0; i<pos.count; i++){
              v.fromBufferAttribute(base,i);
              let noise=Math.sin(v.x*f2+t)*Math.cos(v.y*f2+t*0.8);
              pos.setZ(i, base.getZ(i) + noise*obj.amp);
            }
            obj.mesh.geometry.computeVertexNormals();pos.needsUpdate=true;
          }
          if(obj.isSquishy && obj.baseGeo) {
            let pos=obj.mesh.geometry.attributes.position,base=obj.baseGeo.attributes.position;
            let nrm=obj.baseGeo.attributes.normal, v=new THREE.Vector3(), nm=new THREE.Vector3();
            let f2=obj.freq;
            for(let i=0; i<pos.count; i++){
              v.fromBufferAttribute(base,i);nm.fromBufferAttribute(nrm,i);
              let noise=Math.sin(v.x*f2+t*1.5)*Math.cos(v.y*f2+t*1.2)*Math.sin(v.z*f2+t);
              v.addScaledVector(nm, noise*obj.amp);
              pos.setXYZ(i, v.x, v.y, v.z);
            }
            obj.mesh.geometry.computeVertexNormals();pos.needsUpdate=true;
          }
          if(obj.isCloud) {
            obj.mesh.position.y += Math.sin(t*2 + obj.bobOffset)*0.2;
          }
          if(obj.isDroplets) {
            obj.mesh.position.y += Math.sin(t*1.5)*0.5;
          }
          if(obj.isRibbon && obj.baseGeo) {
            let pos=obj.mesh.geometry.attributes.position, base=obj.baseGeo.attributes.position;
            let v=new THREE.Vector3();
            for(let i=0; i<pos.count; i++) {
              v.fromBufferAttribute(base, i);
              let offset = Math.sin(v.x * obj.freq + t * 2.0) * Math.cos(v.z * obj.freq + t * 1.5) * obj.amp;
              pos.setXYZ(i, v.x + offset * 0.3, v.y + offset, v.z + offset * 0.3);
            }
            obj.mesh.geometry.computeVertexNormals(); pos.needsUpdate=true;
          }
          if(obj.isSpiralParticles && obj.pMeta) {
            let pos=obj.mesh.geometry.attributes.position;
            for(let i=0; i<obj.pMeta.length; i++) {
              let m = obj.pMeta[i];
              m.ang += m.speed * 0.01;
              m.y += m.speed * 0.8;
              if (m.y > 600) m.y = -600;
              let x = Math.cos(m.ang) * m.rad;
              let z = Math.sin(m.ang) * m.rad;
              pos.setXYZ(i, x, m.y, z);
            }
            pos.needsUpdate = true;
          }
          if(obj.isDropletsInstanced && obj.bubbleMeta) {
            let dm = new THREE.Object3D();
            for(let i=0; i<obj.bubbleMeta.length; i++) {
              let m = obj.bubbleMeta[i];
              m.y += m.speed * 1.5;
              if (m.y > obj.maxY) {
                m.y = obj.minY;
              }
              dm.position.set(m.x, m.y, m.z);
              dm.scale.setScalar(0.4 + (i%5)*0.3);
              obj.mesh.updateMatrix = true;
            }
            obj.mesh.instanceMatrix.needsUpdate = true;
          }
          if(obj.isGlowRing) {
            let beat = Math.pow(Math.sin(t*Math.PI*2.0 + obj.mesh.rotation.y)*0.5+0.5, 4);
            obj.mesh.material.emissiveIntensity = obj.baseEmis + beat*3;
            let sc = 1 + beat*0.08; obj.mesh.scale.set(sc,sc,sc);
          }
          if(obj.isPixelGrid) {
            let dm = new THREE.Object3D();
            let idx = 0;
            for(let x=0; x<obj.cols; x++) {
              for(let z=0; z<obj.cols; z++) {
                for(let y=0; y<3; y++) {
                  let posX = obj.pc.x + (x - obj.cols/2) * obj.spacing;
                  let posZ = obj.pc.z + (z - obj.cols/2) * obj.spacing;
                  let heightOffset = Math.sin(x*0.5 + t + obj.seed*5)*Math.cos(z*0.5 + t*0.8 + obj.seed*5)*obj.boxSize*2.0;
                  let posY = obj.pc.y + (y - 1) * obj.spacing + heightOffset;
                  
                  dm.position.set(posX, posY, posZ);
                  let scaleVal = 0.7 + Math.sin(t*2 + x*0.5 + z*0.5)*0.3;
                  dm.scale.setScalar(scaleVal);
                  dm.updateMatrix();
                  obj.mesh.setMatrixAt(idx++, dm.matrix);
                }
              }
            }
            obj.mesh.instanceMatrix.needsUpdate = true;
          }
          if(obj.isNebula && obj.pPos) {
            let pos = obj.mesh.geometry.attributes.position;
            for(let i=0; i<pos.count; i++) {
              let offset = Math.sin(t*1.5 + i*0.01) * 3.0;
              pos.setY(i, obj.pPos[i*3+1] + offset);
            }
            pos.needsUpdate = true;
          }
          if(obj.isFractalTree) {
            obj.mesh.rotation.z = Math.sin(t * 0.8) * 0.04;
            obj.mesh.rotation.x = Math.cos(t * 0.6) * 0.03;
          }
        }
        this.renderer.render(this.scene,this.camera);
      }
    }
    let sceneGen;

    // --- イベント制御 ---
    let apisInitialized = false;

    window.addEventListener('DOMContentLoaded', async () => {
      const btnStart = document.getElementById('btn-start');
      btnStart.disabled = true;
      btnStart.textContent = "Loading APIs & Permissions...";
      
      const ok = await initAPIs();
      if(ok) {
        apisInitialized = true;
        btnStart.disabled = false;
        btnStart.textContent = "START EXPERIENCE";
      } else {
        btnStart.textContent = "Failed to access camera/mic. Please reload.";
      }
    });

    document.getElementById('btn-start').addEventListener('click', () => {
      if(!apisInitialized) return;

      if(audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }

      phase1.style.display = 'none';
      phase2.style.display = 'block';
      currentPhase = 2;

      mpCanvas.width = window.innerWidth;
      mpCanvas.height = window.innerHeight;
      sceneGen = new SceneGenerator(document.getElementById('three-canvas'));

      startSequence();
    });

    async function startSequence() {
      // 3秒カウントダウン
      countdownCenter.textContent = "3";
      await new Promise(r => setTimeout(r, 1000));
      countdownCenter.textContent = "2";
      await new Promise(r => setTimeout(r, 1000));
      countdownCenter.textContent = "1";
      await new Promise(r => setTimeout(r, 1000));
      countdownCenter.textContent = "";

      // 10秒録画開始
      isRecording = true;
      recordData = [];
      recordedChunks = [];
      currentOno = '';
      onoDisplay.textContent = '';
      recIndicator.classList.add('active');

      if(speechRecognition) {
        try { speechRecognition.stop(); } catch(e){}
        setTimeout(() => {
          try { speechRecognition.start(); } catch(e){}
        }, 100);
      }

      mediaRecorder.start();

      collectionLoop();

      // 10秒待機
      await new Promise(r => setTimeout(r, 10000));

      // 録画終了
      isRecording = false;
      if(speechRecognition) {
        try { speechRecognition.stop(); } catch(e){}
      }
      recIndicator.classList.remove('active');
      loadingScreen.style.display = 'flex';

      // onstopをstop()より前に登録（レースコンディション防止）
      mediaRecorder.onstop = () => {
        try {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          playbackVideo.src = URL.createObjectURL(blob);
          playbackVideo.play().catch(()=>{});
        } catch(e) { console.warn('video playback failed', e); }

        // 解析と生成
        try {
          sceneGen.generate();
        } catch(e) {
          console.error('generate() threw:', e);
        }

        // Phase 3へ遷移
        loadingScreen.style.display = 'none';
        phase2.style.display = 'none';
        phase3.style.display = 'block';
        currentPhase = 3;
      };

      mediaRecorder.stop();
    }

    document.getElementById('btn-download-3d').addEventListener('click', () => {
      if (!sceneGen) return;
      sceneGen.renderer.render(sceneGen.scene, sceneGen.camera);
      const dataUrl = sceneGen.renderer.domElement.toDataURL("image/png");
      const link = document.createElement("a");
      link.download = `spatial-art-${Date.now()}.png`;
      link.href = dataUrl;
      link.click();
    });

    document.getElementById('btn-download-video').addEventListener('click', () => {
      if (!recordedChunks || recordedChunks.length === 0) {
        alert("No recorded video found.");
        return;
      }
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = `webcam-video-${Date.now()}.webm`;
      link.href = url;
      link.click();
    });

    document.getElementById('btn-retry').addEventListener('click', () => {
      phase3.style.display = 'none';
      phase2.style.display = 'block';
      currentPhase = 2;
      sceneGen.clear();
      startSequence();
    });

  </script>
